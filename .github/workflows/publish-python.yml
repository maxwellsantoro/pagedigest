name: Publish Python package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. v1.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Check tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          version="$(uv run --project implementations/python-consumer --locked python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("implementations/python-consumer/pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )"
          if [ "${RELEASE_TAG}" != "v${version}" ]; then
            echo "tag ${RELEASE_TAG} does not match pagedigest package version ${version}" >&2
            exit 1
          fi

      - name: Run Python checks
        run: |
          uv run --project implementations/python-consumer --extra dev --locked ruff check \
            implementations/python-consumer/pagedigest \
            implementations/python-consumer/tests \
            implementations/python-consumer/examples \
            tools
          uv run --project implementations/python-consumer --locked python -m unittest discover \
            -s implementations/python-consumer/tests

      - name: Build package
        run: uv build implementations/python-consumer

      - name: Check package metadata
        run: uvx twine check implementations/python-consumer/dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: implementations/python-consumer/dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
