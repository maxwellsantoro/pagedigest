name: Publish npm package

on:
  push:
    tags:
      - "astro-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. astro-v0.2.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish Astro integration to npm
    runs-on: ubuntu-latest
    environment: npm

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: packages/astro

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install current npm
        run: npm install --global npm@latest

      - name: Check tag matches package version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          version="$(node --input-type=module -e "import pkg from './package.json' with { type: 'json' }; console.log(pkg.version)")"
          if [ "${RELEASE_TAG}" != "astro-v${version}" ]; then
            echo "tag ${RELEASE_TAG} does not match @pagedigest/astro version ${version}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish
