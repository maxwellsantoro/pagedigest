name: Publish crates.io package

on:
  push:
    tags:
      - "cargo-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, e.g. cargo-v0.2.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish generator to crates.io
    runs-on: ubuntu-latest
    environment: crates-io

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches crate version
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' implementations/rust-generator/Cargo.toml | head -n 1)"
          if [ "${RELEASE_TAG}" != "cargo-v${version}" ]; then
            echo "tag ${RELEASE_TAG} does not match pagedigest crate version ${version}" >&2
            exit 1
          fi

      - name: Test and package
        run: |
          cargo test --locked --manifest-path implementations/rust-generator/Cargo.toml
          cargo package --locked --manifest-path implementations/rust-generator/Cargo.toml

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked --manifest-path implementations/rust-generator/Cargo.toml
