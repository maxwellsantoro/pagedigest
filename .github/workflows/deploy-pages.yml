name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        run: uv python install 3.12

      - name: Run repository checks
        run: ./tools/run_checks.sh

      - name: Deploy site to Cloudflare Pages
        run: >
          npx --yes wrangler@latest pages deploy site
          --project-name pagedigest
          --branch main
          --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: ff06334131c2a4195d4b68a96dc5ee6a
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
