name: Release

on:
  push:
    tags:
      - "generator-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, e.g. generator-v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-generator:
    name: Build generator (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_ext: ""
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary_ext: ""
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_ext: ".exe"
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Check tag matches generator version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' implementations/rust-generator/Cargo.toml | head -n 1)"
          if [[ "${RELEASE_TAG}" != "generator-v${version}" ]]; then
            echo "tag ${RELEASE_TAG} does not match pagedigest-generator version ${version}" >&2
            exit 1
          fi

      - name: Build release binary
        run: >
          cargo build
          --release
          --locked
          --target "${{ matrix.target }}"
          --manifest-path implementations/rust-generator/Cargo.toml

      - name: Package release asset
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
          BINARY_EXT: ${{ matrix.binary_ext }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_TAG#generator-}"
          asset="pagedigest-generator-${release_version}-${TARGET}"
          package_dir="dist/${asset}"
          mkdir -p "${package_dir}"
          cp "implementations/rust-generator/target/${TARGET}/release/pagedigest-generator${BINARY_EXT}" "${package_dir}/"
          cp LICENSE "${package_dir}/LICENSE"
          cp SPEC.md "${package_dir}/SPEC.md"
          cp implementations/rust-generator/README.md "${package_dir}/README.md"
          if [[ "${ARCHIVE_EXT}" == "zip" ]]; then
            (cd dist && 7z a "${asset}.zip" "${asset}")
          else
            tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"
          fi

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v7
        with:
          name: pagedigest-generator-${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-generator

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc') }}
          files: dist/*
